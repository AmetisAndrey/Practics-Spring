<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Список сущностей</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>

    <style>
        :root {
            --violet-bg-dark: #1a0630;
            --violet-bg: #240046;
            --violet-mid: #5a189a;
            --violet-bright: #9d4edd;
            --violet-pink: #ff4ecd;
            --violet-soft: #e0c3fc;
            --text-main: #f9f7ff;
            --text-muted: #c4bcff;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-main);
            background:
                    radial-gradient(circle at 10% 0, #ff9ff3 0, transparent 55%),
                    radial-gradient(circle at 90% 10%, #7b2cbf 0, transparent 60%),
                    radial-gradient(circle at 0 100%, #3a0ca3 0, transparent 55%),
                    radial-gradient(circle at 100% 100%, #ff4ecd 0, transparent 55%),
                    linear-gradient(145deg, var(--violet-bg-dark), var(--violet-bg));
            background-attachment: fixed;
        }

        .page-wrapper {
            padding: 2.5rem 0;
        }

        .glass-shell {
            border-radius: 1.4rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(61, 12, 124, 0.5));
            box-shadow:
                    0 24px 60px rgba(0, 0, 0, 0.55),
                    0 0 0 1px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
        }

        .navbar {
            background: transparent;
            border-bottom: none;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .navbar-brand span {
            color: var(--violet-pink);
        }

        .hero-title {
            font-weight: 700;
            font-size: 2rem;
        }

        .hero-sub {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .counter-pill {
            border-radius: 999px;
            background: radial-gradient(circle at 0 0, #ffafcc, #5a189a);
            padding: 0.25rem 0.9rem;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #fff;
        }

        .form-label-small {
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .input-group-sm .form-control,
        .form-select-sm {
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(7, 6, 31, 0.5);
            color: var(--text-main);
        }

        .input-group-sm .form-control::placeholder {
            color: rgba(226, 221, 255, 0.6);
        }

        .input-group-text {
            border-radius: 0.75rem 0 0 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: radial-gradient(circle at 0 0, var(--violet-pink), var(--violet-mid));
            color: #fff;
        }

        /* Таблица в фиолетовом стиле */
        .table {
            color: var(--text-main);
            margin-bottom: 0;
            background: radial-gradient(circle at 0 0,
            rgba(157, 78, 221, 0.22),
            rgba(10, 3, 35, 0.96));
            border-collapse: separate;
            border-spacing: 0;
        }

        .table > :not(caption) > * > * {
            border-color: rgba(255, 255, 255, 0.06); /* мягкие разделители */
        }

        .table thead th {
            border-bottom: 1px solid rgba(255, 255, 255, 0.16);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-muted);
            background: linear-gradient(135deg,
            rgba(157, 78, 221, 0.9),
            rgba(88, 28, 135, 0.95));
        }

        .table tbody tr {
            background: rgba(12, 4, 40, 0.92);
        }

        .table tbody tr:nth-child(even) {
            background: rgba(18, 6, 60, 0.96);
        }

        .table tbody tr:hover {
            background: radial-gradient(circle at 0 0,
            rgba(255, 78, 205, 0.35),
            rgba(10, 3, 35, 0.98));
        }


        .btn-neon {
            position: relative;
            border-radius: 999px;
            border: none;
            color: #fff;
            padding-inline: 1.4rem;
            background-image: linear-gradient(135deg, var(--violet-pink), var(--violet-bright));
            box-shadow:
                    0 0 18px rgba(255, 78, 205, 0.6),
                    0 0 0 1px rgba(255, 255, 255, 0.2);
            font-weight: 500;
        }

        .btn-neon:hover {
            filter: brightness(1.06);
            box-shadow:
                    0 0 25px rgba(255, 78, 205, 0.85),
                    0 0 0 1px rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .btn-ghost {
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(11, 6, 40, 0.5);
            color: var(--text-main);
        }

        .btn-ghost:hover {
            background: rgba(186, 104, 255, 0.18);
            color: #fff;
        }

        .btn-ghost-danger {
            border-color: rgba(255, 149, 149, 0.8);
            color: #ffc9c9;
        }

        .btn-ghost-danger:hover {
            background: rgba(255, 77, 109, 0.18);
            color: #ffe5f0;
        }

        .card-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.16);
        }

        .pagination .page-link {
            border-radius: 999px !important;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .pagination .page-item.active .page-link {
            background-image: linear-gradient(135deg, var(--violet-bright), var(--violet-pink));
            color: #fff;
            box-shadow: 0 0 15px rgba(189, 124, 255, 0.7);
        }

        .pagination .page-link:hover {
            background: rgba(129, 140, 248, 0.18);
            color: #fff;
        }

        a,
        a:hover {
            text-decoration: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-check2-square me-2 text-light"></i>
            <span>VIOLET</span> CRUD
        </a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                <div class="mb-3 d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="hero-title mb-1">Сущности</h1>
                        <p class="hero-sub mb-0">
                            Храни и редактируй свои записи в одном фиолетовом пространстве.
                        </p>
                    </div>
                    <div class="text-end">
                        <div class="form-label-small">Всего записей</div>
                        <span class="counter-pill"
                              th:text="${itemsPage != null ? itemsPage.totalElements : 0}">0</span>
                    </div>
                </div>

                <div class="glass-shell p-3 p-md-4">
                    <!-- Фильтры -->
                    <div class="mb-3">
                        <form class="row g-2 align-items-end"
                              method="get"
                              th:action="@{/list}">
                            <div class="col-12 col-md-4">
                                <label class="form-label-small">Поиск</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text">
                                        <i class="bi bi-search"></i>
                                    </span>
                                    <input type="text"
                                           class="form-control"
                                           name="search"
                                           placeholder="Имя или описание..."
                                           th:value="${search}">
                                </div>
                            </div>

                            <div class="col-6 col-md-3">
                                <label class="form-label-small">Сортировка</label>
                                <select class="form-select form-select-sm"
                                        name="sort">
                                    <option th:value="'createdAt'"
                                            th:selected="${sort == 'createdAt'}">
                                        По дате создания
                                    </option>
                                    <option th:value="'name'"
                                            th:selected="${sort == 'name'}">
                                        По имени
                                    </option>
                                </select>
                            </div>

                            <div class="col-6 col-md-2">
                                <label class="form-label-small">Порядок</label>
                                <select class="form-select form-select-sm"
                                        name="dir">
                                    <option th:value="'desc'"
                                            th:selected="${dir == 'desc'}">Убыв.</option>
                                    <option th:value="'asc'"
                                            th:selected="${dir == 'asc'}">Возр.</option>
                                </select>
                            </div>

                            <div class="col-6 col-md-2">
                                <label class="form-label-small">Размер</label>
                                <select class="form-select form-select-sm"
                                        name="size">
                                    <option th:value="5" th:selected="${itemsPage != null and itemsPage.size == 5}">5</option>
                                    <option th:value="10" th:selected="${itemsPage != null and itemsPage.size == 10}">10</option>
                                    <option th:value="20" th:selected="${itemsPage != null and itemsPage.size == 20}">20</option>
                                </select>
                            </div>

                            <div class="col-6 col-md-1 text-end">
                                <button type="submit"
                                        class="btn btn-ghost btn-sm w-100">
                                    OK
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Таблица -->
                    <div class="table-responsive mb-2">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th style="width: 22%">Имя</th>
                                <th style="width: 35%">Описание</th>
                                <th style="width: 15%">Создано</th>
                                <th style="width: 15%">Обновлено</th>
                                <th style="width: 13%" class="text-end">Действия</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${itemsPage == null or itemsPage.content.isEmpty()}">
                                <td colspan="5" class="text-center text-muted py-4">
                                    <i class="bi bi-stars me-1"></i>
                                    Здесь пока пусто. Создай первую сущность.
                                </td>
                            </tr>

                            <tr th:each="item : ${itemsPage.content}">
                                <td class="fw-semibold" th:text="${item.name}">Название</td>
                                <td th:text="${item.description} ?: '-'">Описание</td>
                                <td th:text="${#temporals.format(item.createdAt, 'dd.MM.yyyy HH:mm')}">
                                    01.01.2025 12:00
                                </td>
                                <td th:text="${#temporals.format(item.updatedAt, 'dd.MM.yyyy HH:mm')}">
                                    01.01.2025 12:00
                                </td>
                                <td class="text-end">
                                    <a class="btn btn-ghost btn-sm me-1"
                                       th:href="@{|/list/${item.id}/edit|}">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{|/list/${item.id}/delete|}"
                                          method="post"
                                          class="d-inline"
                                          onsubmit="return confirm('Удалить эту сущность?');">
                                        <button type="submit"
                                                class="btn btn-ghost-danger btn-sm">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Футер карточки -->
                    <div class="card-footer bg-transparent px-0 pt-3 pb-0 d-flex justify-content-between align-items-center border-0">
                        <div class="small text-muted" th:if="${itemsPage != null}">
                            Страница
                            <span th:text="${itemsPage.number + 1}">1</span>
                            из
                            <span th:text="${itemsPage.totalPages}">1</span>
                        </div>

                        <div class="d-flex align-items-center gap-2">
                            <a class="btn btn-ghost btn-sm"
                               th:href="@{/list}">
                                <i class="bi bi-arrow-counterclockwise me-1"></i>
                                Сбросить
                            </a>
                            <a class="btn btn-neon btn-sm"
                               th:href="@{/list/new}">
                                <i class="bi bi-plus-lg me-1"></i>
                                Новая сущность
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Пагинация -->
                <nav th:if="${itemsPage != null and itemsPage.totalPages > 1}"
                     class="mt-3">
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item"
                            th:classappend="${itemsPage.first} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/list(page=${itemsPage.number-1},size=${itemsPage.size},sort=${sort},dir=${dir},search=${search})}">
                                &laquo;
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, itemsPage.totalPages-1)}"
                            th:classappend="${i == itemsPage.number} ? 'active'">
                            <a class="page-link"
                               th:text="${i+1}"
                               th:href="@{/list(page=${i},size=${itemsPage.size},sort=${sort},dir=${dir},search=${search})}">
                            </a>
                        </li>

                        <li class="page-item"
                            th:classappend="${itemsPage.last} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/list(page=${itemsPage.number+1},size=${itemsPage.size},sort=${sort},dir=${dir},search=${search})}">
                                &raquo;
                            </a>
                        </li>
                    </ul>
                </nav>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
