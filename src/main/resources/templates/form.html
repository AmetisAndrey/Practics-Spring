<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${isNew} ? 'Создание сущности' : 'Редактирование сущности'">
    Форма сущности
  </title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>

  <style>
    :root {
      --violet-bg-dark: #1a0630;
      --violet-bg: #240046;
      --violet-mid: #5a189a;
      --violet-bright: #9d4edd;
      --violet-pink: #ff4ecd;
      --violet-soft: #e0c3fc;
      --text-main: #a791f3;
      --text-muted: #c4bcff;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
              radial-gradient(circle at 10% 0, #ff9ff3 0, transparent 55%),
              radial-gradient(circle at 90% 10%, #7b2cbf 0, transparent 60%),
              radial-gradient(circle at 0 100%, #3a0ca3 0, transparent 55%),
              radial-gradient(circle at 100% 100%, #ff4ecd 0, transparent 55%),
              linear-gradient(145deg, var(--violet-bg-dark), var(--violet-bg));
      background-attachment: fixed;
    }

    .navbar {
      background: transparent;
    }

    .navbar-brand {
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    .navbar-brand span {
      color: var(--violet-pink);
    }

    .page-wrapper {
      min-height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .glass-card {
      border-radius: 1.4rem;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(77, 10, 145, 0.7));
      box-shadow:
              0 26px 65px rgba(0, 0, 0, 0.6),
              0 0 0 1px rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .glass-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
    }

    .hero-title {
      font-weight: 600;
      font-size: 1.4rem;
    }

    .hero-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .badge-mode {
      border-radius: 999px;
      background: radial-gradient(circle at 0 0, var(--violet-pink), var(--violet-mid));
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #fff;
      font-size: 0.75rem;
      padding: 0.2rem 0.7rem;
    }

    .form-label {
      font-weight: 500;
      color: var(--violet-soft);
    }

    .form-control,
    .form-control:focus {
      border-radius: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(7, 6, 31, 0.5);
      color: var(--text-main);
      box-shadow: none;
    }

    .form-control::placeholder {
      color: rgba(226, 221, 255, 0.7);
    }

    .form-control:focus {
      border-color: var(--violet-pink);
      box-shadow: 0 0 0 3px rgba(255, 78, 205, 0.35);
    }

    .error-text {
      font-size: 0.8rem;
      color: #ffd1dc;
    }

    .btn-neon {
      border-radius: 999px;
      border: none;
      color: #fff;
      padding-inline: 1.4rem;
      background-image: linear-gradient(135deg, var(--violet-pink), var(--violet-bright));
      box-shadow:
              0 0 18px rgba(255, 78, 205, 0.7),
              0 0 0 1px rgba(255, 255, 255, 0.22);
      font-weight: 500;
    }

    .btn-neon:hover {
      filter: brightness(1.06);
      box-shadow:
              0 0 26px rgba(255, 78, 205, 0.9),
              0 0 0 1px rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    .btn-ghost {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: rgba(8, 7, 33, 0.55);
      color: var(--text-main);
    }

    .btn-ghost:hover {
      background: rgba(186, 104, 255, 0.2);
      color: #fff;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">
      <i class="bi bi-check2-square me-2 text-light"></i>
      <span>VIOLET</span> CRUD
    </a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-7 col-xl-6">
        <div class="glass-card p-3 p-md-4">
          <div class="glass-header pb-3 mb-3 d-flex justify-content-between align-items-start">
            <div>
              <h1 class="hero-title mb-1"
                  th:text="${isNew} ? 'Новая сущность' : 'Редактирование сущности'">
                Новая сущность
              </h1>
              <p class="hero-sub mb-0">
                Имя обязательно, описание — по желанию. Вносите изменения и сохраняйте.
              </p>
            </div>
            <span class="badge-mode">
                            <i class="bi bi-magic me-1"></i>
                            <span th:text="${isNew} ? 'Создание' : 'Редактирование'">Создание</span>
                        </span>
          </div>

          <form th:object="${item}"
                th:action="${isNew} ? @{/list} : @{|/list/${itemId}|}"
                method="post"
                novalidate>

            <!-- Имя -->
            <div class="mb-3">
              <label for="name" class="form-label">Имя сущности</label>
              <input id="name"
                     type="text"
                     th:field="*{name}"
                     class="form-control"
                     placeholder="Например: Purple Item #1"/>
              <div class="error-text"
                   th:if="${#fields.hasErrors('name')}"
                   th:errors="*{name}">
              </div>
            </div>

            <!-- Описание -->
            <div class="mb-3">
              <label for="description" class="form-label">Описание</label>
              <textarea id="description"
                        rows="4"
                        th:field="*{description}"
                        class="form-control"
                        placeholder="Кратко опишите сущность (необязательно)"></textarea>
              <div class="error-text"
                   th:if="${#fields.hasErrors('description')}"
                   th:errors="*{description}">
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3">
              <a th:href="@{/list}"
                 class="btn btn-ghost btn-sm">
                <i class="bi bi-arrow-left me-1"></i>
                Назад к списку
              </a>

              <div class="d-flex gap-2">
                <button type="reset"
                        class="btn btn-ghost btn-sm">
                  <i class="bi bi-eraser me-1"></i>
                  Очистить
                </button>
                <button type="submit"
                        class="btn btn-neon btn-sm">
                  <i class="bi bi-check-lg me-1"></i>
                  <span th:text="${isNew} ? 'Создать' : 'Сохранить'">
                                        Создать
                                    </span>
                </button>
              </div>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
